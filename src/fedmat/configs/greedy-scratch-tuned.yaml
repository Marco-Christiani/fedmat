defaults:
  - base
  - _self_
  - matcher: greedy

_target_: fedmat.config.TrainConfig
run_name:
seed: 42
model_name: google/vit-base-patch16-224-in21k
use_pretrained: false
learning_rate: 1e-4
lr_decay: 0.95
weight_decay: 0.01
batch_size: 64
local_steps: 500
max_grad_norm: 2.0
log_every_n_steps: 50
use_bf16: true
use_torch_compile: true
num_workers: 8
prefetch_factor: 4
homogeneity: 100.0
num_clients: 10
num_rounds: 100
save_round_checkpoints: true
save_final_checkpoint: true
dry: false
optimizer: adamw_amsgrad

dataset: cifar10
num_labels: 10
max_train_samples: 50000
max_eval_samples: 1000

output_dir: ${hydra:runtime.output_dir}/vit_cifar10
